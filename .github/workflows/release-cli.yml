name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-payloads:
    name: Publish ${{ matrix.label }} CLI payload
    runs-on: ${{ matrix.runner }}
    environment: npm-publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-15
            package_dir: packages/cli-local-darwin-arm64
          - label: macOS x64
            runner: macos-15
            package_dir: packages/cli-local-darwin-x64
          - label: Linux x64
            runner: ubuntu-latest
            package_dir: packages/cli-local-linux-x64
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: second-9r
      SENTRY_PROJECT: second-next

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Derive version
        id: release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package version
        shell: bash
        run: npm --prefix "${{ matrix.package_dir }}" pkg set version="${{ steps.release.outputs.version }}"

      - name: Install dependencies
        shell: bash
        run: |
          npm ci --prefix apps/web
          npm ci --prefix apps/worker
          npm ci --prefix packages/cli

      - name: Validate
        shell: bash
        run: |
          npm --prefix packages/cli run build
          npm --prefix apps/web run typecheck
          npm --prefix apps/worker run typecheck

      - name: Build payload
        shell: bash
        run: npm --prefix "${{ matrix.package_dir }}" run build

      - name: Pack check
        shell: bash
        run: cd "${{ matrix.package_dir }}" && npm pack --dry-run --ignore-scripts

      - name: Publish payload
        shell: bash
        run: cd "${{ matrix.package_dir }}" && npm publish --access public --ignore-scripts

  publish-launcher:
    name: Publish CLI launcher
    runs-on: ubuntu-latest
    needs: publish-payloads
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Derive version
        id: release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package version
        shell: bash
        run: |
          npm --prefix packages/cli pkg set version="${{ steps.release.outputs.version }}"
          npm --prefix packages/cli install --package-lock-only --ignore-scripts

      - name: Install dependencies
        shell: bash
        run: npm ci --prefix packages/cli

      - name: Validate
        shell: bash
        run: npm --prefix packages/cli run build

      - name: Pack check
        shell: bash
        run: cd packages/cli && npm pack --dry-run --ignore-scripts

      - name: Publish launcher
        shell: bash
        run: cd packages/cli && npm publish --access public --ignore-scripts
