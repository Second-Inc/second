version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      root-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      web-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/apps/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      worker-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/packages/cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cli-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/packages/cli-local-darwin-arm64"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cli-payload-dependencies:
        patterns:
          - "*"
